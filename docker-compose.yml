services:
  admin_db:
    image: postgres:16
    container_name: admin_panel_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: admin_panel
    ports:
      - "5433:5432"
    volumes:
      - admin_db_data:/var/lib/postgresql/data

volumes:
  admin_db_data:
