services:
  admin_db:
    image: postgres:16
    container_name: admin_panel_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - admin_db_data:/var/lib/postgresql/data

volumes:
  admin_db_data:
